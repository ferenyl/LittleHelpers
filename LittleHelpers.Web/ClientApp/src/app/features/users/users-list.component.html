<div class="page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">Användare</h1>
    <a routerLink="new" class="btn btn-primary">+ Ny användare</a>
  </div>

  @if (loading()) {
    <p class="text-muted">Laddar...</p>
  } @else {
    <table class="table table-hover table-bordered">
      <thead>
        <tr><th>Namn</th><th>Roll</th><th>Åtgärder</th></tr>
      </thead>
      <tbody>
        @for (user of users(); track user.id) {
          <tr>
            <td>{{ user.username }}</td>
            <td>
              <span class="badge" [class]="user.userLevel === 'Parent' ? 'bg-purple text-white' : 'bg-success'">
                {{ user.userLevel }}
              </span>
            </td>
            <td>
              <a [routerLink]="[user.id, 'edit']" class="btn btn-sm btn-outline-secondary me-1">Redigera</a>
              <button (click)="delete(user.id)" class="btn btn-sm btn-outline-danger">Ta bort</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
