<div class="page">
  <h1 class="mb-4">{{ editId() ? ('users.editHeading' | transloco) : ('users.createHeading' | transloco) }}</h1>

  @if (error()) { <div class="alert alert-danger">{{ error() }}</div> }

  <form [formGroup]="form" (ngSubmit)="submit()" class="card shadow-sm p-4" style="max-width:480px">
    <div class="mb-3">
      <label class="form-label">{{ 'users.form.username' | transloco }}</label>
      <input formControlName="username" type="text" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">
        {{ 'users.form.password' | transloco }}
        @if (editId()) { <span class="text-muted small ms-1">{{ 'users.form.passwordHint' | transloco }}</span> }
      </label>
      <input formControlName="password" type="password" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">{{ 'users.form.role' | transloco }}</label>
      <select formControlName="userLevel" class="form-select">
        <option value="Child">{{ 'users.form.roleChild' | transloco }}</option>
        <option value="Parent">{{ 'users.form.roleParent' | transloco }}</option>
      </select>
    </div>
    @if (isChild) {
      <div class="mb-3">
        <label class="form-label">{{ 'users.form.allowance' | transloco }}</label>
        <input formControlName="monthlyAllowance" type="number" min="0" [placeholder]="'users.form.allowancePlaceholder' | transloco" class="form-control" />
      </div>
      <div class="mb-3">
        <label class="form-label">{{ 'users.form.pointsGoal' | transloco }}</label>
        <input formControlName="pointsGoal" type="number" min="1" [placeholder]="'users.form.pointsGoalPlaceholder' | transloco" class="form-control" />
      </div>
    }
    <div class="d-flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary" [disabled]="loading()">{{ 'common.save' | transloco }}</button>
      <a routerLink="/users" class="btn btn-outline-secondary">{{ 'common.cancel' | transloco }}</a>
    </div>
  </form>
</div>
