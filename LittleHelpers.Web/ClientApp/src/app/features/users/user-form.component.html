<div class="page">
  <h1 class="mb-4">{{ editId() ? 'Redigera användare' : 'Ny användare' }}</h1>

  @if (error()) { <div class="alert alert-danger">{{ error() }}</div> }

  <form [formGroup]="form" (ngSubmit)="submit()" class="card shadow-sm p-4" style="max-width:480px">
    <div class="mb-3">
      <label class="form-label">Användarnamn</label>
      <input formControlName="username" type="text" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">Lösenord {{ editId() ? '(lämna tomt för att behålla)' : '' }}</label>
      <input formControlName="password" type="password" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">Roll</label>
      <select formControlName="userLevel" class="form-select">
        <option value="Child">Child</option>
        <option value="Parent">Parent</option>
      </select>
    </div>
    @if (isChild) {
      <div class="mb-3">
        <label class="form-label">Månadspeng (kr)</label>
        <input formControlName="monthlyAllowance" type="number" min="0" placeholder="t.ex. 200" class="form-control" />
      </div>
      <div class="mb-3">
        <label class="form-label">Poängmål för full månadspeng</label>
        <input formControlName="pointsGoal" type="number" min="1" placeholder="t.ex. 25" class="form-control" />
      </div>
    }
    <div class="d-flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary" [disabled]="loading()">Spara</button>
      <a routerLink="/users" class="btn btn-outline-secondary">Avbryt</a>
    </div>
  </form>
</div>
