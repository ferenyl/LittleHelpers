<div class="d-flex justify-content-center align-items-center min-vh-100 bg-body">
  <div class="card shadow" style="min-width:360px;max-width:400px;width:100%">
    <div class="card-body p-4">
      <h1 class="h4 text-primary fw-bold mb-1">{{ 'login.title' | transloco }}</h1>
      <h2 class="h6 text-muted mb-4">{{ 'login.heading' | transloco }}</h2>

      @if (error()) {
        <div class="alert alert-danger py-2">{{ error() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">{{ 'login.username' | transloco }}</label>
          <input formControlName="username" type="text" class="form-control" autocomplete="username" />
        </div>
        <div class="mb-3">
          <label class="form-label">{{ 'login.password' | transloco }}</label>
          <input formControlName="password" type="password" class="form-control" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
          @if (loading()) { {{ 'login.submitting' | transloco }} } @else { {{ 'login.submit' | transloco }} }
        </button>
      </form>
    </div>
  </div>
</div>
