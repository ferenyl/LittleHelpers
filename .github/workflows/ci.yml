name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet run --no-build --configuration Release --project LittleHelpers.Tests/LittleHelpers.Tests.csproj

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: LittleHelpers.Web/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: LittleHelpers.Web

      - name: Angular build (verify)
        run: npx ng build --configuration production
        working-directory: LittleHelpers.Web

      - name: Angular tests
        run: npx ng test --watch=false
        working-directory: LittleHelpers.Web

  publish:
    name: Build & push Docker images
    needs: test
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag name
        id: tag
        run: echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ferenyl/littlehelpers.api:${{ steps.tag.outputs.name }}
            ferenyl/littlehelpers.api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ferenyl/littlehelpers.web:${{ steps.tag.outputs.name }}
            ferenyl/littlehelpers.web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
