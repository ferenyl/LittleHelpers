name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet run --no-build --configuration Release --project LittleHelpers.Tests/LittleHelpers.Tests.csproj

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: LittleHelpers.Web/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: LittleHelpers.Web

      - name: Angular build (verify)
        run: npx ng build --configuration production
        working-directory: LittleHelpers.Web

      - name: Angular tests
        run: npx ng test --watch=false
        working-directory: LittleHelpers.Web

  tag-meta:
    name: Evaluate release tag
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.meta.outputs.on_main }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      release_version: ${{ steps.meta.outputs.release_version }}
      api_tags: ${{ steps.meta.outputs.api_tags }}
      web_tags: ${{ steps.meta.outputs.web_tags }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build tag metadata
        id: meta
        run: |
          set -euo pipefail

          echo "release_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

          if git branch -r --contains "$GITHUB_SHA" | grep -qE 'origin/main$'; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$GITHUB_REF_NAME" == *-pre* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            {
              echo "api_tags<<EOF"
              echo "ferenyl/littlehelpers.api:${GITHUB_REF_NAME}"
              echo "ferenyl/littlehelpers.api:prerelease"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "web_tags<<EOF"
              echo "ferenyl/littlehelpers.web:${GITHUB_REF_NAME}"
              echo "ferenyl/littlehelpers.web:prerelease"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            {
              echo "api_tags<<EOF"
              echo "ferenyl/littlehelpers.api:${GITHUB_REF_NAME}"
              echo "ferenyl/littlehelpers.api:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "web_tags<<EOF"
              echo "ferenyl/littlehelpers.web:${GITHUB_REF_NAME}"
              echo "ferenyl/littlehelpers.web:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Build & push Docker images
    needs: [test, tag-meta]
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v') && needs.tag-meta.outputs.on_main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ needs.tag-meta.outputs.api_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          build-args: |
            RELEASE_VERSION=${{ needs.tag-meta.outputs.release_version }}
          push: true
          tags: ${{ needs.tag-meta.outputs.web_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: [test, tag-meta]
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v') && needs.tag-meta.outputs.on_main == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release from tag
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.tag-meta.outputs.prerelease }}
        run: |
          set -euo pipefail

          if [[ "$PRERELEASE" == "true" ]]; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --prerelease
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          fi
