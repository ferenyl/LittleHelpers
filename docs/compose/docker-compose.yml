# LittleHelpers – Docker Compose
#
# Kopiera den här filen till docker-compose.yml och fyll i alla värden.
# Skapa en .env-fil bredvid docker-compose.yml med dina hemligheter
# (se .env.example).

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: littlehelpers
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: littlehelpers
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U littlehelpers -d littlehelpers"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (ASP.NET Core) ──────────────────────────────────────────────────────
  apiservice:
    image: ${APISERVICE_IMAGE:-ferenyl/littlehelpers.api:latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Databasanslutning
      ConnectionStrings__littlehelpers: >
        Host=postgres;Port=5432;Username=littlehelpers;
        Password=${POSTGRES_PASSWORD};Database=littlehelpers
      # JWT – måste vara minst 32 tecken
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-littlehelpers}
      Jwt__Audience: ${JWT_AUDIENCE:-littlehelpers}
      Jwt__AccessTokenLifetimeHours: ${JWT_ACCESS_TOKEN_LIFETIME_HOURS:-168}
      Jwt__RenewTokenLifetimeHours: ${JWT_RENEW_TOKEN_LIFETIME_HOURS:-336}
      # Seed-konto (skapas vid första start om det inte finns)
      SeedAdminPassword: ${SEED_ADMIN_PASSWORD}
      # Månadscykel: dag i månaden då ny period börjar (1-31, fallback till sista dag)
      MonthlyCycle__BreakpointDay: ${MONTHLY_CYCLE_BREAKPOINT_DAY:-1}
      # Firebase-notiser
      FirebaseNotifications__Active: ${FIREBASE_NOTIFICATIONS_ACTIVE:-false}
      FirebaseNotifications__ProjectId: ${FIREBASE_PROJECT_ID:-}
      FirebaseNotifications__PrivateKeyId: ${FIREBASE_PRIVATE_KEY_ID:-}
      FirebaseNotifications__PrivateKey: ${FIREBASE_PRIVATE_KEY:-}
      FirebaseNotifications__ClientEmail: ${FIREBASE_CLIENT_EMAIL:-}
      FirebaseNotifications__ClientId: ${FIREBASE_CLIENT_ID:-}
    expose:
      - "80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Angular-frontend via nginx ──────────────────────────────────────────────
  webfrontend:
    image: ${WEBFRONTEND_IMAGE:-ferenyl/littlehelpers.web:latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-4200}:80"
    environment:
      # nginx.conf.template substituerar detta till proxy_pass
      API_URL: http://apiservice
      # Web app metadata (manifest + <title>)
      WEBAPP_NAME: ${WEBAPP_NAME:-LittleHelpers}
      WEBAPP_SHORT_NAME: ${WEBAPP_SHORT_NAME:-LittleHelpers}
      WEBAPP_DESCRIPTION: ${WEBAPP_DESCRIPTION:-Family chore management app.}
      WEBAPP_LANG: ${WEBAPP_LANG:-en}
      WEBAPP_TITLE: ${WEBAPP_TITLE:-LittleHelpers}
    depends_on:
      apiservice:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
    driver: local
